<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F4FF"/>
      <stop offset="1" stop-color="#EDE7FF"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBFAFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9B59B6"/>
      <stop offset="1" stop-color="#6C47FF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6C47FF"/>
    </marker>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="60" font-size="34" font-weight="700" fill="#1F1B3A">Building mode — experience flow</text>
  <text x="60" y="90" font-size="16" fill="#5E5882">Invitation → Reveal → Interaction → Snap → Completion Magic · plus Sandbox</text>

  <!-- ===================== Phase 1 — Invitation ===================== -->
  <g transform="translate(60,140)">
    <rect width="280" height="180" rx="20" fill="url(#frame)" stroke="#D9D2FF" stroke-width="1.5"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#6C47FF">PHASE 1</text>
    <text x="20" y="52" font-size="17" font-weight="700" fill="#1F1B3A">Invitation</text>
    <!-- World hex grid sketch -->
    <g transform="translate(20,72)" stroke="#6C47FF" fill="#F0EBFF">
      <circle cx="30" cy="30" r="22"/>
      <circle cx="90" cy="20" r="22"/>
      <circle cx="150" cy="30" r="22"/>
      <circle cx="210" cy="20" r="22"/>
      <circle cx="30" cy="80" r="22"/>
      <circle cx="90" cy="90" r="22"/>
      <circle cx="150" cy="80" r="22"/>
      <circle cx="210" cy="90" r="22"/>
    </g>
    <text x="20" y="165" font-size="11" fill="#5E5882">"What should we build today?"</text>
  </g>

  <!-- ===================== Phase 2 — Reveal ===================== -->
  <g transform="translate(380,140)">
    <rect width="280" height="180" rx="20" fill="url(#frame)" stroke="#D9D2FF" stroke-width="1.5"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#6C47FF">PHASE 2</text>
    <text x="20" y="52" font-size="17" font-weight="700" fill="#1F1B3A">Build Reveal</text>
    <!-- silhouette + drifting pieces -->
    <g transform="translate(20,72)">
      <!-- silhouette (house shape, dashed) -->
      <path d="M120,90 L120,40 L160,15 L200,40 L200,90 Z" fill="#EDE7FF" stroke="#9B7BFF" stroke-width="2" stroke-dasharray="5 4"/>
      <circle cx="30" cy="40" r="10" fill="#FFD84D" opacity="0.9"/>
      <circle cx="60" cy="80" r="8" fill="#A855F7" opacity="0.8"/>
      <rect x="225" y="30" width="18" height="14" rx="3" fill="#4ECDC4" opacity="0.9"/>
      <circle cx="245" cy="70" r="9" fill="#FF6B6B" opacity="0.85"/>
    </g>
    <text x="20" y="165" font-size="11" fill="#5E5882">silhouette + drifting pieces</text>
  </g>

  <!-- ===================== Phase 3 — Interaction ===================== -->
  <g transform="translate(700,140)">
    <rect width="280" height="180" rx="20" fill="url(#frame)" stroke="#D9D2FF" stroke-width="1.5"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#6C47FF">PHASE 3</text>
    <text x="20" y="52" font-size="17" font-weight="700" fill="#1F1B3A">Piece Interaction</text>
    <g transform="translate(20,72)">
      <path d="M120,90 L120,40 L160,15 L200,40 L200,90 Z" fill="#EDE7FF" stroke="#9B7BFF" stroke-width="2" stroke-dasharray="5 4"/>
      <!-- grabbed piece in motion with hand cursor -->
      <circle cx="80" cy="55" r="14" fill="#FFD84D" stroke="#1F1B3A" stroke-width="2"/>
      <circle cx="80" cy="55" r="22" fill="none" stroke="#FFD84D" stroke-width="2" stroke-dasharray="3 4" opacity="0.8"/>
      <!-- magic cursor crosshair -->
      <g transform="translate(80,55)" stroke="#6C47FF" stroke-width="2" fill="none">
        <circle r="4"/>
        <line x1="-12" x2="-7" y1="0" y2="0"/>
        <line x1="7" x2="12" y1="0" y2="0"/>
        <line x1="0" x2="0" y1="-12" y2="-7"/>
        <line x1="0" x2="0" y1="7" y2="12"/>
      </g>
    </g>
    <text x="20" y="165" font-size="11" fill="#5E5882">pinch-grab → smoothed follow</text>
  </g>

  <!-- ===================== Phase 4 — Snap ===================== -->
  <g transform="translate(1020,140)">
    <rect width="280" height="180" rx="20" fill="url(#frame)" stroke="#D9D2FF" stroke-width="1.5"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#6C47FF">PHASE 4</text>
    <text x="20" y="52" font-size="17" font-weight="700" fill="#1F1B3A">Snap</text>
    <g transform="translate(20,72)">
      <path d="M120,90 L120,40 L160,15 L200,40 L200,90 Z" fill="#EDE7FF" stroke="#9B7BFF" stroke-width="2" stroke-dasharray="5 4"/>
      <!-- glowing target zone -->
      <circle cx="160" cy="60" r="28" fill="#FFD84D" opacity="0.35" filter="url(#soft)"/>
      <circle cx="160" cy="60" r="20" fill="none" stroke="#FFD84D" stroke-width="2.5"/>
      <!-- piece being pulled -->
      <circle cx="140" cy="70" r="12" fill="#FFD84D" stroke="#1F1B3A" stroke-width="2"/>
      <path d="M140,70 Q150,65 160,60" stroke="#9B7BFF" stroke-width="2" fill="none" stroke-dasharray="2 3"/>
    </g>
    <text x="20" y="165" font-size="11" fill="#5E5882">visual promise · then magnetic commit</text>
  </g>

  <!-- ===================== Phase 5 — Completion ===================== -->
  <g transform="translate(1340,140)">
    <rect width="220" height="180" rx="20" fill="url(#frame)" stroke="#D9D2FF" stroke-width="1.5"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#6C47FF">PHASE 5</text>
    <text x="20" y="52" font-size="17" font-weight="700" fill="#1F1B3A">Completion Magic</text>
    <g transform="translate(20,72)">
      <!-- completed house with lit windows -->
      <path d="M60,90 L60,40 L100,15 L140,40 L140,90 Z" fill="#FBFAFF" stroke="#6C47FF" stroke-width="2"/>
      <rect x="70" y="55" width="14" height="14" fill="#FFD84D"/>
      <rect x="116" y="55" width="14" height="14" fill="#FFD84D"/>
      <rect x="92" y="68" width="16" height="22" fill="#9B7BFF"/>
      <!-- smoke -->
      <circle cx="130" cy="10" r="4" fill="#D9D2FF"/>
      <circle cx="138" cy="2" r="3" fill="#D9D2FF"/>
      <!-- sparkles -->
      <text x="30" y="30" font-size="18" fill="#FFD84D">✦</text>
      <text x="160" y="30" font-size="14" fill="#FFD84D">✦</text>
    </g>
    <text x="20" y="165" font-size="11" fill="#5E5882">"You made a house!"</text>
  </g>

  <!-- Flow arrows -->
  <g stroke="#6C47FF" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="340" y1="230" x2="380" y2="230"/>
    <line x1="660" y1="230" x2="700" y2="230"/>
    <line x1="980" y1="230" x2="1020" y2="230"/>
    <line x1="1300" y1="230" x2="1340" y2="230"/>
  </g>

  <!-- Loop back arrow -->
  <g stroke="#9B7BFF" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#arrow)">
    <path d="M1450,340 Q1480,400 1400,420 L200,420 Q120,420 200,360"/>
  </g>
  <text x="720" y="412" font-size="12" fill="#5E5882" font-style="italic">next build · or unlock Sandbox</text>

  <!-- ============================================================== -->
  <!-- Snap mechanic detail callout -->
  <g transform="translate(60,470)">
    <rect width="740" height="280" rx="24" fill="#FFFFFF" stroke="#D9D2FF" stroke-width="1.5"/>
    <text x="28" y="38" font-size="13" font-weight="700" fill="#6C47FF">SNAP ENGINE — zero-shame design</text>
    <text x="28" y="62" font-size="18" font-weight="700" fill="#1F1B3A">Visual promise fires BEFORE commit</text>

    <!-- diagram -->
    <g transform="translate(40,90)">
      <!-- target ring -->
      <circle cx="180" cy="80" r="80" fill="#FFD84D" opacity="0.10"/>
      <circle cx="180" cy="80" r="55" fill="#FFD84D" opacity="0.18"/>
      <circle cx="180" cy="80" r="30" fill="#FFD84D" opacity="0.3"/>
      <circle cx="180" cy="80" r="6" fill="#1F1B3A"/>

      <text x="270" y="40" font-size="12" fill="#5E5882">tolerance × 1.4 — glow begins</text>
      <line x1="180" y1="80" x2="265" y2="40" stroke="#9B7BFF" stroke-width="1.2" stroke-dasharray="3 3"/>
      <text x="270" y="80" font-size="12" fill="#5E5882">tolerance × 1.0 — magnetic pull</text>
      <line x1="180" y1="80" x2="265" y2="80" stroke="#9B7BFF" stroke-width="1.2" stroke-dasharray="3 3"/>
      <text x="270" y="120" font-size="12" fill="#5E5882">tolerance × 0.5 — soft "thmm" sound</text>
      <line x1="180" y1="80" x2="265" y2="120" stroke="#9B7BFF" stroke-width="1.2" stroke-dasharray="3 3"/>
      <text x="270" y="160" font-size="12" fill="#5E5882">release in tolerance → COMMIT</text>
      <line x1="180" y1="80" x2="265" y2="160" stroke="#6C47FF" stroke-width="1.5"/>
    </g>

    <text x="28" y="248" font-size="11" fill="#7A6FA6">After 3 missed attempts on the same piece, tolerance silently grows ×1.25 (cap ×1.5). Wrong placement never produces red, X, or harsh sound.</text>
  </g>

  <!-- Build types matrix -->
  <g transform="translate(840,470)">
    <rect width="720" height="280" rx="24" fill="#FFFFFF" stroke="#D9D2FF" stroke-width="1.5"/>
    <text x="28" y="38" font-size="13" font-weight="700" fill="#6C47FF">THREE BUILD TYPES</text>
    <text x="28" y="62" font-size="18" font-weight="700" fill="#1F1B3A">Same object, different assistance</text>

    <!-- Header -->
    <g transform="translate(28,92)" font-size="12" fill="#1F1B3A" font-weight="700">
      <text x="0" y="0">Type</text>
      <text x="120" y="0">Age</text>
      <text x="180" y="0">Silhouette</text>
      <text x="330" y="0">Snap tol.</text>
      <text x="430" y="0">Decoys</text>
      <text x="520" y="0">Sequencing</text>
    </g>
    <line x1="28" y1="102" x2="692" y2="102" stroke="#D9D2FF"/>

    <g transform="translate(28,124)" font-size="12" fill="#3F4052">
      <text x="0" y="0" font-weight="700" fill="#6C47FF">Guided</text>
      <text x="120" y="0">3–5</text>
      <text x="180" y="0">visible · glowing</text>
      <text x="330" y="0">0.08</text>
      <text x="430" y="0">none</text>
      <text x="520" y="0">1 piece at a time</text>
    </g>

    <g transform="translate(28,156)" font-size="12" fill="#3F4052">
      <text x="0" y="0" font-weight="700" fill="#A855F7">Assisted</text>
      <text x="120" y="0">5–7</text>
      <text x="180" y="0">partial</text>
      <text x="330" y="0">0.055</text>
      <text x="430" y="0">1–2</text>
      <text x="520" y="0">all visible · any order</text>
    </g>

    <g transform="translate(28,188)" font-size="12" fill="#3F4052">
      <text x="0" y="0" font-weight="700" fill="#FF6B6B">Discovery</text>
      <text x="120" y="0">8–11</text>
      <text x="180" y="0">hidden until 50%</text>
      <text x="330" y="0">0.038</text>
      <text x="430" y="0">3+</text>
      <text x="520" y="0">order matters</text>
    </g>

    <text x="28" y="248" font-size="11" fill="#7A6FA6">LIOS adaptive engine picks the right type per session — or teacher overrides in Classroom panel.</text>
  </g>

  <!-- ============================================================== -->
  <!-- Sandbox flow -->
  <g transform="translate(60,790)">
    <rect width="1500" height="280" rx="24" fill="url(#frame)" stroke="#D9D2FF" stroke-width="1.5"/>

    <text x="28" y="38" font-size="13" font-weight="700" fill="#FF6B6B">SANDBOX — viral engine</text>
    <text x="28" y="64" font-size="18" font-weight="700" fill="#1F1B3A">Unlocked after 3 guided builds · free composition · custom animations</text>

    <!-- 1. empty canvas -->
    <g transform="translate(28,100)">
      <rect width="220" height="140" rx="14" fill="#FBFAFF" stroke="#D9D2FF"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#6C47FF">1 · pieces tray</text>
      <g transform="translate(14,36)">
        <circle cx="20" cy="20" r="14" fill="#FFD84D" stroke="#1F1B3A" stroke-width="1.5"/>
        <circle cx="60" cy="20" r="14" fill="#A855F7" stroke="#1F1B3A" stroke-width="1.5"/>
        <circle cx="100" cy="20" r="14" fill="#4ECDC4" stroke="#1F1B3A" stroke-width="1.5"/>
        <rect x="130" y="6" width="28" height="28" rx="4" fill="#FF6B6B" stroke="#1F1B3A" stroke-width="1.5"/>
        <rect x="168" y="6" width="32" height="28" rx="4" fill="#9B7BFF" stroke="#1F1B3A" stroke-width="1.5"/>
        <circle cx="20" cy="65" r="14" fill="#7ED957" stroke="#1F1B3A" stroke-width="1.5"/>
        <rect x="40" y="51" width="28" height="28" rx="14" fill="#FF8C42" stroke="#1F1B3A" stroke-width="1.5"/>
        <polygon points="92,51 110,79 74,79" fill="#3498DB" stroke="#1F1B3A" stroke-width="1.5"/>
      </g>
    </g>

    <!-- arrow -->
    <line x1="268" y1="170" x2="304" y2="170" stroke="#FF6B6B" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>

    <!-- 2. compose -->
    <g transform="translate(310,100)">
      <rect width="280" height="140" rx="14" fill="#FBFAFF" stroke="#D9D2FF"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#6C47FF">2 · compose freely</text>
      <!-- rocket-bicycle: rocket body + two wheels -->
      <g transform="translate(140,80)">
        <rect x="-12" y="-30" width="24" height="40" rx="12" fill="#FF6B6B" stroke="#1F1B3A" stroke-width="1.5"/>
        <polygon points="-12,10 12,10 0,28" fill="#FF8C42" stroke="#1F1B3A" stroke-width="1.5"/>
        <circle cx="-30" cy="34" r="14" fill="#1F1B3A"/>
        <circle cx="-30" cy="34" r="8" fill="#FFD84D"/>
        <circle cx="30" cy="34" r="14" fill="#1F1B3A"/>
        <circle cx="30" cy="34" r="8" fill="#FFD84D"/>
      </g>
      <text x="14" y="130" font-size="10" fill="#5E5882" font-style="italic">"rocket-bicycle"</text>
    </g>

    <!-- arrow -->
    <line x1="610" y1="170" x2="646" y2="170" stroke="#FF6B6B" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>

    <!-- 3. animate -->
    <g transform="translate(652,100)">
      <rect width="280" height="140" rx="14" fill="#FBFAFF" stroke="#D9D2FF"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#6C47FF">3 · palm-open to animate</text>
      <g transform="translate(80,80)">
        <rect x="-12" y="-30" width="24" height="40" rx="12" fill="#FF6B6B" stroke="#1F1B3A" stroke-width="1.5"/>
        <polygon points="-12,10 12,10 0,28" fill="#FF8C42" stroke="#1F1B3A" stroke-width="1.5"/>
        <circle cx="-30" cy="34" r="14" fill="#1F1B3A"/>
        <circle cx="30" cy="34" r="14" fill="#1F1B3A"/>
      </g>
      <!-- motion lines + flame -->
      <g stroke="#FF6B6B" stroke-width="2.5" fill="none">
        <path d="M130,140 Q160,135 200,120"/>
        <path d="M140,160 Q180,158 220,148"/>
      </g>
      <text x="220" y="80" font-size="20">💨</text>
      <text x="14" y="130" font-size="10" fill="#5E5882" font-style="italic">rides AND takes off</text>
    </g>

    <!-- arrow -->
    <line x1="952" y1="170" x2="988" y2="170" stroke="#FF6B6B" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>

    <!-- 4. share -->
    <g transform="translate(994,100)">
      <rect width="220" height="140" rx="14" fill="#FBFAFF" stroke="#D9D2FF"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#6C47FF">4 · screenshot</text>
      <rect x="20" y="36" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#D9D2FF"/>
      <text x="110" y="60" font-size="11" font-weight="700" fill="#1F1B3A" text-anchor="middle">My Rocket-Bicycle</text>
      <g transform="translate(110,90)">
        <rect x="-8" y="-14" width="16" height="22" rx="8" fill="#FF6B6B"/>
        <circle cx="-18" cy="14" r="6" fill="#1F1B3A"/>
        <circle cx="18" cy="14" r="6" fill="#1F1B3A"/>
      </g>
      <text x="14" y="130" font-size="10" fill="#5E5882" font-style="italic">behind Adult Gate</text>
    </g>

    <!-- 5. learner state -->
    <g transform="translate(1234,100)">
      <rect width="244" height="140" rx="14" fill="#FBFAFF" stroke="#D9D2FF"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#6C47FF">5 · classifier update</text>
      <g transform="translate(14,40)" font-size="11" fill="#3F4052">
        <text x="0" y="0">→ <tspan font-weight="700" fill="#A855F7">Creative Constructor</tspan></text>
        <text x="0" y="18">→ sandbox time ↑</text>
        <text x="0" y="36">→ compound count ↑</text>
        <text x="0" y="54">→ LIOS regime: flow</text>
        <text x="0" y="76" font-style="italic" fill="#7A6FA6">surfaced to teacher dashboard</text>
      </g>
    </g>
  </g>

</svg>
